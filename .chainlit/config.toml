[project]
# If true, traces from all users will be accessible in the UI.
enable_telemetry = false

# List of environment variables that users are allowed to set.
user_env = []

# Duration (in seconds) during which the session is saved when the connection is lost.
session_timeout = 3600

# Enable third parties caching (e.g. LangChain cache)
cache = false

# Authorized origins
allow_origins = ["*"]

[features]
# Process and display HTML in messages. Required for rich welcome cards.
unsafe_allow_html = true


# Process and display mathematical expressions. This requires the katex package.
latex = false

# Automatically tag threads with the current chat profile.
auto_tag_thread = false

# Allow users to edit their own messages
edit_message = true

# Show prompt playground
prompt_playground = false

# Speech to text
[features.speech_to_text]
    enabled = true

[features.audio]
    enabled = true

# Multi-file upload enabled
[features.spontaneous_file_upload]
    enabled = true
    accept = ["*/*"]
    max_files = 10
    max_size_mb = 100

[UI]
# Name of the assistant.
name = "NexusAI"

# Description of the assistant. This is used for the meta description tag.
description = "Dual-Engine Scholar-Gamer CoPilot — powered by Groq & Gemini"

# Default theme (light/dark)
default_theme = "dark"

# Don't ask for confirmation when clicking new chat
confirm_new_chat = false

# Chain of Thought expanded by default
default_cot = "expanded"

# Collapse large feedback forms
show_feedback_buttons = true

# Custom CSS path
custom_css = "/public/stylesheet.css"

# Custom JS (for workspace copilot injection)
custom_js = "/public/workspace/app.js"

# Custom theme file
theme_path = "/public/theme.json"

# Logo paths
logo = "/public/logo_dark.png"

# GitHub link in header
github = ""

# Show readme on new chat (set false to hide the README tab on new chat)
# show_readme_as_default = false

[UI.header]
hideable = false

[meta]
generated_by = "1.3.0"

[data_persistence]
# Explicitly enable the data layer
enabled = true
