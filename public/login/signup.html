<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI — Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070b14;
            --glass-bg: rgba(13, 20, 36, 0.6);
            --glass-border: rgba(0, 212, 255, 0.15);
            --cyan: #00d4ff;
            --violet: #7c3aed;
            --text-1: #ffffff;
            --text-2: #94a3b8;
            --text-3: #475569;
            --error: #f87171;
            --success: #34d399;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-1);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ================= BACKGROUND ================= */
        .scene { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.4;
            animation: float-orb 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--cyan); top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: var(--violet); bottom: -150px; right: -100px; animation-delay: -5s; }
        .grid {
            position: absolute; inset: -50%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: grid-move 20s linear infinite;
            opacity: 0.5;
        }
        @keyframes float-orb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }
        @keyframes grid-move { 0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } 100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); } }

        /* ================= CARD ================= */
        .glass-card {
            width: 100%; max-width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        .brand { text-align: center; margin-bottom: 30px; }
        .brand-logo { display: inline-flex; justify-content: center; align-items: center; width: 48px; height: 48px; background: linear-gradient(135deg, var(--cyan), var(--violet)); border-radius: 12px; margin-bottom: 12px; }
        .brand-logo svg { width: 24px; height: 24px; fill: white; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .card-subtitle { text-align: center; color: var(--text-2); font-size: 14px; margin-bottom: 30px; }

        /* ================= FORM ================= */
        .form-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 8px; }
        .input-wrap { position: relative; display: flex; align-items: center; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; transition: border-color 0.2s, background 0.2s; }
        .input-wrap:focus-within { border-color: var(--cyan); background: rgba(0,212,255,0.05); }
        .input-prefix { position: absolute; left: 14px; color: var(--text-3); display: flex; align-items: center; }
        .input-prefix svg { width: 18px; height: 18px; fill: currentColor; }
        .form-input { width: 100%; background: transparent; border: none; padding: 14px 14px 14px 40px; color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
        .form-input::placeholder { color: var(--text-3); }

        /* ================= BUTTON ================= */
        .btn-primary {
            width: 100%; background: linear-gradient(135deg, var(--cyan) 0%, var(--violet) 100%); border: none; border-radius: 12px; padding: 14px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,212,255,0.3); }
        .btn-primary svg { width: 18px; height: 18px; fill: currentColor; }

        /* ================= ALERT ================= */
        .alert-bar {
            display: none; align-items: flex-start; gap: 10px; border-radius: 10px; padding: 12px; font-size: 13px; margin-bottom: 20px; line-height: 1.4;
        }
        .alert-bar.show { display: flex; }
        .alert-bar.error { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); color: var(--error); }
        .alert-bar.success { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.25); color: var(--success); }
        .alert-bar svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; margin-top: 1px; }

        /* ================= FOOTER ================= */
        .footer-link { display: flex; justify-content: center; margin-top: 24px; font-size: 14px; color: var(--text-2); }
        .footer-link a { color: var(--cyan); text-decoration: none; font-weight: 600; margin-left: 6px; }
        .footer-link a:hover { text-decoration: underline; }

    </style>
</head>
<body>

<div class="scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid"></div>
</div>

<div class="glass-card">
    <div class="brand">
        <div class="brand-logo">
            <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div class="brand-name">NexusAI</div>
    </div>
    
    <div class="card-subtitle">Create your free account to continue</div>

    <div class="alert-bar" id="alertBar">
        <svg id="alertIcon" viewBox="0 0 24 24"></svg>
        <span id="alertText"></span>
    </div>

    <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">First Name</label>
                <div class="input-wrap">
                    <span class="input-prefix">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </span>
                    <input class="form-input" type="text" id="firstName" placeholder="First Name" required autofocus />
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Last Name</label>
                <div class="input-wrap">
                    <span class="input-prefix">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </span>
                    <input class="form-input" type="text" id="lastName" placeholder="Last Name" />
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-wrap">
                <span class="input-prefix">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                </span>
                <input class="form-input" type="text" id="username" placeholder="Choose a username" required minlength="3" />
            </div>
        </div>

        <button type="submit" class="btn-primary" id="signupBtn">
            Create Account
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </button>
    </form>

    <div class="footer-link">
        Already have an account? <a href="/public/login/index.html">Sign In</a>
    </div>
</div>

<script>
    const svgError = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>';
    const svgSuccess = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';

    function showAlert(msg, type) {
        const bar = document.getElementById('alertBar');
        document.getElementById('alertIcon').innerHTML = type === 'success' ? svgSuccess : svgError;
        document.getElementById('alertText').textContent = msg;
        bar.className = `alert-bar ${type} show`;
    }

    async function handleSignup(e) {
        e.preventDefault();
        const btn = document.getElementById('signupBtn');
        const username = document.getElementById('username').value.trim();

        if (username.length < 3) {
            showAlert('Username must be at least 3 characters.', 'error');
            return;
        }

        btn.disabled = true;
        btn.style.opacity = '0.7';

        try {
            showAlert(`Account ready for "${username}"! Signing you in...`, 'success');

            // Send username as BOTH username and password to log in automatically
            // Our app.py has been modified to enforce password == username
            const resp = await fetch('/login', {
                method: 'POST',
                body: new URLSearchParams({ username: username, password: username }),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });

            if (resp.ok) {
                window.location.href = '/';
            } else {
                showAlert('Could not sign you in automatically. Please log in manually.', 'error');
                setTimeout(() => { window.location.href = '/public/login/index.html'; }, 2000);
            }
        } catch (err) {
            showAlert('Network error. Please try again.', 'error');
            btn.disabled = false;
            btn.style.opacity = '1';
        }
    }
</script>
</body>
</html>
