<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NexusAI Document Workspace — Dual-Engine Scholar-Gamer CoPilot">
    <title>NexusAI — Document Workspace</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chainlit Copilot Widget script (served by the Chainlit server) -->
    <script src="http://localhost:8000/copilot/index.js"></script>
</head>
<body>

    <!-- Full-width Document Workspace -->
    <!-- The Chainlit sidebar (displayMode: "sidebar") attaches to the right edge
         and pushes this workspace panel automatically — no manual width required. -->
    <div class="workspace">
        <!-- Top 80%: Native Document Viewer -->
        <div id="viewer-section" class="viewer-section">
            <iframe id="doc-viewer" class="pdf-viewer" style="display: none;" src="" width="100%" height="100%"></iframe>

            <div id="viewer-placeholder" class="viewer-placeholder">
                <div class="placeholder-icon">📚</div>
                <h2>Native Document Workspace</h2>
                <p>Upload files and select a document below to read inline here.</p>
            </div>

            <div id="script-preview-container" class="script-preview-container" style="display: none;">
                <pre><code id="script-preview-code"></code></pre>
            </div>
        </div>

        <!-- Bottom 20%: Staging Tray & Dropzone -->
        <div class="workspace-bottom">
            <!-- Dropzone -->
            <div class="upload-box" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <div class="upload-box-content">
                    <span class="upload-icon">⚡</span>
                    <h3>Drag files here or Click to upload</h3>
                </div>
                <input type="file" id="file-input" style="display: none;"
                    multiple
                    accept=".png,.jpg,.jpeg,.webp,.doc,.docx,.pdf,.ppt,.pptx,.xls,.xlsx,.txt,.csv,.py,.js,.json,.md"
                    onchange="handleFiles(this.files)">
            </div>

            <!-- Staging Tray -->
            <div id="staging-tray" class="staging-tray">
                <div class="tray-header">
                    <h4>Staged Files <span id="staged-count">(0)</span></h4>
                    <button id="analyze-btn" class="analyze-btn" onclick="analyzeStagedFiles()" disabled>Analyze Selected File</button>
                </div>
                <div id="staged-files-list" class="staged-files-list"></div>
            </div>
        </div>

        <p id="status-text"></p>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Gamer Plugin Toggle -->
    <a href="http://localhost:8001" target="_blank" class="plugin-toggle" style="position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: #222; padding: 10px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
        </svg>
    </a>

    <!-- Workspace Logic -->
    <script src="app.js"></script>
</body>
</html>
